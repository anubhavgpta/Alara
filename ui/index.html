<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    @font-face {
      font-family: 'IRANYekan';
      src: url('../ui/IRANYekan.woff2') format('woff2'),
           url('../ui/IRANYekan.woff') format('woff'),
           url('../ui/IRANYekan.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "SF Pro Text", system-ui, sans-serif;
      background: transparent !important;
      color: #fff;
      overflow: hidden;
    }

    .overlay {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background: rgba(15, 15, 15, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 8px 14px 6px 14px;
      display: grid;
      grid-template-rows: 1fr auto 2px;
      gap: 3px;
      transition: border-color 150ms ease, background 150ms ease;
    }

    .top-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
    }

    .brand-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: block;
    }

    .brand-text {
      font-family: 'IRANYekan', "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: none;
      color: rgba(255, 255, 255, 0.9);
    }

    .input-wrap {
      min-width: 0;
    }

    #goalInput {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 15px;
      line-height: 1.2;
      padding: 0;
      transition: opacity 150ms ease, color 150ms ease;
    }

    #goalInput::placeholder {
      color: rgba(255, 255, 255, 0.48);
      transition: color 150ms ease;
    }

    .status {
      max-width: 230px;
      min-width: 72px;
      text-align: right;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 150ms ease;
    }

    .step-line {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.38);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      min-height: 0;
      transition: opacity 150ms ease, color 150ms ease;
    }

    .step-line.visible {
      opacity: 1;
      min-height: 12px;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 2px;
      border-radius: 999px;
      background: transparent;
      overflow: hidden;
      opacity: 0;
      transition: opacity 150ms ease, background 150ms ease;
    }

    .progress-track.visible {
      opacity: 1;
    }

    .progress-fill {
      width: 100%;
      height: 100%;
      background: transparent;
      transition: background 150ms ease;
    }

    .progress-track.indeterminate .progress-fill {
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.9) 45%, transparent 100%);
      width: 44%;
      animation: shimmer 1s linear infinite;
    }

    .plan-section {
      padding: 8px 0 4px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .plan-goal {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      line-height: 1.4;
    }

    .plan-steps {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 200px;
      overflow-y: auto;
    }

    .plan-steps li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      padding: 3px 0;
    }

    .plan-steps li .step-icon {
      font-size: 11px;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }

    .plan-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 4px;
    }

    .plan-meta {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
    }

    .plan-actions {
      display: flex;
      gap: 6px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 120ms ease;
    }

    .btn:hover { opacity: 0.85; }

    .btn-cancel {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }

    .btn-confirm {
      background: #6366f1;
      color: #fff;
    }

    @keyframes shimmer {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(280%); }
    }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="top-row">
      <div class="brand" aria-hidden="true">
        <img src="../ui/alara.svg"
             class="brand-logo"
             alt=""
             draggable="false" />
      </div>

      <div class="input-wrap">
        <input id="goalInput" type="text" placeholder="Describe what you want Alara to do..." autocomplete="off" />
      </div>

      <div id="status" class="status">Ready</div>
    </div>

    <div id="planSection" class="plan-section" hidden>
      <div id="planGoal" class="plan-goal"></div>
      <ul id="planSteps" class="plan-steps"></ul>
      <div class="plan-footer">
        <span id="planMeta" class="plan-meta"></span>
        <div class="plan-actions">
          <button id="cancelBtn" class="btn btn-cancel">
            Cancel
          </button>
          <button id="confirmBtn" class="btn btn-confirm">
            Execute
          </button>
        </div>
      </div>
    </div>

    <div id="stepLine" class="step-line"></div>

    <div id="progressTrack" class="progress-track" aria-hidden="true">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>

  <script>
    const goalInput = document.getElementById('goalInput');
    const statusEl = document.getElementById('status');
    const stepLineEl = document.getElementById('stepLine');
    const progressTrackEl = document.getElementById('progressTrack');
    const progressFillEl = document.getElementById('progressFill');

    const STATE_CONFIG = {
      idle: { label: 'Ready', color: 'rgba(255,255,255,0.45)', progress: 'hidden' },
      processing: { label: 'Executing...', color: '#3B9EFF', progress: 'indeterminate' },
      planning: { label: 'Planning...', color: '#9B59FF', progress: 'indeterminate' },
      executing: { label: 'Executing...', color: '#3B9EFF', progress: 'indeterminate' },
      verifying: { label: 'Verifying...', color: '#F5A623', progress: 'indeterminate' },
      reflecting: { label: 'Reflecting...', color: '#FF6B6B', progress: 'indeterminate' },
      done: { label: 'Done', color: '#2ECC71', progress: 'solid' },
      failed: { label: 'Failed', color: '#E74C3C', progress: 'solid' },
      awaiting_confirm: {
        label: 'Review plan',
        color: '#9B59FF',
        progress: 'hidden'
      }
    };

    let state = 'idle';
    let resultTimer = null;

    function clearResultTimer() {
      if (resultTimer) {
        clearTimeout(resultTimer);
        resultTimer = null;
      }
    }

    function applyProgress(mode, color) {
      progressTrackEl.classList.remove('visible', 'indeterminate');
      progressFillEl.style.background = 'transparent';

      if (mode === 'hidden') {
        return;
      }

      progressTrackEl.classList.add('visible');

      if (mode === 'indeterminate') {
        progressTrackEl.classList.add('indeterminate');
        progressTrackEl.style.background = color;
        return;
      }

      progressTrackEl.style.background = 'transparent';
      progressFillEl.style.background = color;
    }

    function setState(nextState, customStatusText) {
      const normalized = STATE_CONFIG[nextState] ? nextState : 'idle';
      const cfg = STATE_CONFIG[normalized];
      state = normalized;
      statusEl.style.color = cfg.color;
      statusEl.textContent = customStatusText || cfg.label;
      applyProgress(cfg.progress, cfg.color);

      if (normalized === 'idle') {
        goalInput.disabled = false;
      } else if (normalized === 'done' || normalized === 'failed') {
        goalInput.disabled = true;
      } else {
        goalInput.disabled = true;
      }
    }

    function setStepText(current, total, description) {
      const text = `Step ${current}/${total} - ${description}`;
      stepLineEl.textContent = text;
      stepLineEl.classList.add('visible');
    }

    function clearStepText() {
      stepLineEl.textContent = '';
      stepLineEl.classList.remove('visible');
    }

    function resetOverlayState() {
      clearResultTimer();
      goalInput.value = '';
      goalInput.disabled = false;
      clearStepText();
      setState('idle');
    }

    function submitGoal() {
      const text = goalInput.value.trim();
      if (!text) return;
      clearResultTimer();
      clearStepText();
      window.alara.send({ type: 'goal_submit', goal: text });
      setState('processing');
    }

    goalInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        submitGoal();
      }

      if (event.key === 'Escape') {
        event.preventDefault();
        window.alara.send({ type: 'hide_overlay' });
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        event.preventDefault();
        window.alara.send({ type: 'hide_overlay' });
      }
    });

    window.alara.onMessage((message) => {
      if (!message || typeof message !== 'object') return;

      if (message.type === 'overlay_shown') {
        goalInput.focus();
        goalInput.select();
        return;
      }

      if (message.type === 'overlay_hidden') {
        goalInput.blur();
        resetOverlayState();
        return;
      }

      if (message.type === 'state') {
        setState(message.state || 'idle');
        if (message.state === 'idle') {
          goalInput.disabled = false;
          planSection.hidden = true;
          window.alara.resizeWindow(72);
        } else if (message.state === 'planning') {
          goalInput.disabled = true;
        }
        return;
      }

      if (message.type === 'status') {
        statusEl.textContent = message.message;
        return;
      }

      if (message.type === 'plan_ready') {
        showPlan(message);
        return;
      }

      if (message.type === 'execution_started') {
        planSection.hidden = true;
        goalInput.disabled = true;
        setState('executing');
        return;
      }

      if (message.type === 'step_progress') {
        setStepText(message.steps_done, message.steps_total, message.description);
        progressTrackEl.classList.remove('indeterminate');
        progressTrackEl.classList.add('visible');
        progressFillEl.style.background = '#6366f1';
        progressFillEl.style.width = message.progress_pct + '%';
        progressFillEl.style.transition = 'width 0.3s ease';
        return;
      }

      if (message.type === 'execution_complete') {
        clearStepText();
        const success = message.success;
        setState(success ? 'done' : 'failed',
          success
            ? `✓ ${message.steps_completed}/${message.total_steps} steps completed` 
            : `✗ Failed — ${message.steps_completed}/${message.total_steps} steps`);
        
        if (success) {
          progressFillEl.style.width = '100%';
        }
        
        resultTimer = setTimeout(() => {
          resetOverlayState();
          window.alara.send({ type: 'hide_overlay' });
        }, 3000);
        return;
      }

      if (message.type === 'error') {
        setState('failed', message.message);
        setTimeout(() => {
          goalInput.disabled = false;
          setState('idle');
        }, 2000);
        return;
      }

      if (message.type === 'step_update') {
        const current = Number(message.current || 0);
        const total = Number(message.total || 0);
        const description = String(message.description || '').trim();
        if (current > 0 && total > 0 && description) {
          setStepText(current, total, description);
        }
        return;
      }

      if (message.type === 'result') {
        clearResultTimer();
        clearStepText();

        const success = Boolean(message.success);
        const resultState = success ? 'done' : 'failed';
        const resultText = String(message.message || (success ? 'Task completed' : 'Task failed'));

        setState(resultState, resultText);

        resultTimer = setTimeout(() => {
          resetOverlayState();
          window.alara.send({ type: 'hide_overlay' });
        }, 3000);
      }
    });

    function showPlan(message) {
      const planGoal = document.getElementById('planGoal');
      const planSteps = document.getElementById('planSteps');
      const planMeta = document.getElementById('planMeta');
      
      planGoal.textContent = message.goal;
      
      planSteps.innerHTML = '';
      message.steps.forEach(step => {
        const icon = step.step_type === "filesystem" ? "📁"
                   : step.step_type === "cli"        ? "⚡"
                   : step.step_type === "system"     ? "⚙️"
                   : "•";
        
        const li = document.createElement('li');
        li.innerHTML = `<span class="step-icon">${icon}</span>${step.description}`;
        planSteps.appendChild(li);
      });
      
      planMeta.textContent = `${message.step_count} steps · ${message.scope} · ${message.complexity}`;
      
      planSection.hidden = false;
      
      const calculatedHeight = 180 + (message.step_count * 28);
      window.alara.resizeWindow(Math.max(220, Math.min(480, calculatedHeight)));
      
      setState('awaiting_confirm');
    }

    const confirmBtn = document.getElementById('confirmBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const planSection = document.getElementById('planSection');

    confirmBtn.addEventListener('click', () => {
      window.alara.send({ type: 'goal_confirm' });
    });

    cancelBtn.addEventListener('click', () => {
      window.alara.send({ type: 'goal_cancel' });
      planSection.hidden = true;
      goalInput.disabled = false;
      goalInput.value = '';
      setState('idle');
      window.alara.resizeWindow(72);
    });

    setState('idle');
  </script>
</body>
</html>
