[user]
name = "Anubhav Gupta"
timezone = "Asia/Kolkata"
response_style = "concise"

[workspace]
path = "C:/Users/Anubhav Gupta/alara-workspace"

[alara]
version = "0.1.0"
first_run_complete = true

[gemini]
primary_model = "gemini-2.5-flash"
fallback_model = "gemini-2.5-flash-lite"
request_timeout_seconds = 30
max_retries = 2

[composio]
# Connected apps are discovered automatically from Composio at startup.
# Use `composio add <app>` to connect a new app — no changes here needed.

[coding]
backend = "aider"                          # "aider" | "openhands"
aider_model = "gemini/gemini-2.5-flash"
aider_encoding = "utf-8"                    # file encoding passed to aider --encoding (e.g. utf-16 for Windows-saved files)
openhands_base_url = "http://localhost:3000"
openhands_timeout_seconds = 120
auto_commit = false
